name: Spring Boot Automated Release

on:
  push:
    branches:
      - main # Wakes up automatically whenever code lands on main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: Main
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test
        working-directory: ./course-recommender
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/Main
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-recommender-jar
          path: course-recommender/target/*.jar
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "course-recommender/target/surefire-reports/*.xml"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for creating tags and releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the auto-tagger can see previous versions

      # 1. Automatically calculate and bump the version tag (e.g., v1.0.1)
      - name: Bump version and push tag
        id: auto_tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch # Increments the last digit (1.0.0 -> 1.0.1) unless specified in commit

      # 2. Download the compiled JAR
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: course-recommender-jar
          path: ./release-assets

      # 3. Create the Release page using the newly generated tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.auto_tag.outputs.new_tag }}
          files: ./release-assets/*.jar
          generate_release_notes: true