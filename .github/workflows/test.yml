name: Spring Boot CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers the workflow when a version tag is pushed (e.g., v1.0.0)
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: Main
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test
        working-directory: ./course-recommender
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/Main
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-recommender-jar
          path: course-recommender/target/*.jar

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "course-recommender/target/surefire-reports/*.xml"

  release:
    name: Create GitHub Release
    needs: build
    # Only run this job if a tag starting with 'v' was pushed to the repository
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Downloads the compiled JAR generated in the build job
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: course-recommender-jar
          path: ./release-assets

      # Automatically generates nice release notes based on commit history
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*.jar
          generate_release_notes: true