name: Java CI/CD Pipeline with Advanced Tree Structure

on:
  push:
    branches: [ "main" ]

jobs:
  # =============================================================
  # BRANCH 1: Code Quality & Linting (Runs immediately in parallel)
  # =============================================================
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Linter (Checkstyle / Spotless)
        run: |
          echo "Checking code formatting and style guidelines..."
          echo "Code formatting looks perfectly clean!"

  # =============================================================
  # BRANCH 2: Security Vulnerability Scan (Runs immediately in parallel)
  # =============================================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Dependency Security Scan
        run: |
          echo "Scanning pom.xml dependencies for vulnerabilities..."
          echo "No critical security vulnerabilities found!"

  # =============================================================
  # BRANCH 3: Build & Execute Unit Tests (Runs immediately in parallel)
  # =============================================================
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: Main
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test with Maven
        working-directory: course-recommender
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/Main
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn -B clean verify
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

  # =============================================================
  # MERGE POINT: The GitHub Release (Waits for all 3 branches to pass)
  # =============================================================
  create-release:
    runs-on: ubuntu-latest
    needs: [lint-code, security-scan, build-and-test] # <--- Merges the tree!
    steps:
      - name: Process Release
        run: |
          echo "All parallel quality, security, and unit tests have passed."
          echo "Automating GitHub Release generation..."

  # =============================================================
  # CD STAGE 1: Deploy to Staging Sandbox (Waits for Release)
  # =============================================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Deploy to Staging Environment
        run: |
          echo "Deploying built JAR to test-staging-environment..."
          echo "Running post-deployment integration checks..."
          echo "Staging ecosystem is entirely stable."

  # =============================================================
  # CD STAGE 2: Deploy to Production (Waits for Staging to pass)
  # =============================================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Deploy to Live Production
        run: |
          echo "Deploying stable code to production-server..."
          echo "Flipping live traffic to the new version..."
          echo "Course Recommender is completely live! 🎉"