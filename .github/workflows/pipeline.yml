name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1: Always runs on PRs and pushes to main
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: Main
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test
        working-directory: ./course-recommender
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/Main
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-recommender-jar
          path: course-recommender/target/*.jar
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "course-recommender/target/surefire-reports/*.xml"

  # JOB 2: Only runs on main branch pushes, AFTER the build job passes
  release:
    name: Create GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: auto_tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: course-recommender-jar
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.auto_tag.outputs.new_tag }}
          files: ./release-assets/*.jar
          generate_release_notes: true