<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Error</title></head>
<body>
<h1 layout:fragment="pageTitle">Error</h1>
<div layout:fragment="content">

    <div class="max-w-md mx-auto text-center py-16">
        <div class="text-5xl mb-4">⚠</div>
        <h2 class="font-display text-2xl text-slate-800 mb-2" th:text="${errorTitle}">Error</h2>
        <p class="text-slate-500 text-sm mb-6" th:text="${errorMessage}">Something went wrong.</p>
        <a th:href="@{/}" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">← Back to Dashboard</a>
    </div>

</div>
</body>
</html>
