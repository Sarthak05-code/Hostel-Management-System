<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mark Attendance</title></head>
<body>
<h1 layout:fragment="pageTitle">Mark Attendance</h1>
<div layout:fragment="content">

    <div class="max-w-2xl">
        <div class="mb-4 flex items-center justify-between">
            <a th:href="@{/classes/{id}(id=${classGroup.id})}"
               class="text-sm text-indigo-600 hover:text-indigo-800">← Back to Class</a>
            <span th:if="${classGroup.subjectGroup.name() == 'COMPUTER_PHYSICS'}"
                  class="bg-indigo-100 text-indigo-700 text-xs font-medium px-3 py-1 rounded-full">
                Computer & Physics
            </span>
            <span th:if="${classGroup.subjectGroup.name() == 'ACCOUNTS_ECONOMICS'}"
                  class="bg-amber-100 text-amber-700 text-xs font-medium px-3 py-1 rounded-full">
                Accounts & Economics
            </span>
        </div>

        <!-- Date picker -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-4 flex items-center gap-4">
            <label class="text-sm font-medium text-slate-700">Date</label>
            <input type="date" id="datePicker"
                   th:value="${date}"
                   class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   th:onchange="'window.location.href = \'/attendance/class/\' + ' + ${classGroup.id} + ' + \'?date=\' + this.value'"/>
        </div>

        <!-- Attendance form -->
        <form th:action="@{/attendance/class/{id}/mark(id=${classGroup.id})}" method="post">
            <input type="hidden" name="date" th:value="${date}"/>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="text-left px-5 py-3 text-slate-500 font-medium">Student</th>
                            <th class="text-left px-5 py-3 text-slate-500 font-medium">Section</th>
                            <th class="text-left px-5 py-3 text-slate-500 font-medium">Total Absences</th>
                            <th class="text-left px-5 py-3 text-slate-500 font-medium">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="student : ${classGroup.students}"
                            class="hover:bg-slate-50 transition-colors">
                            <td class="px-5 py-3 font-medium text-slate-800"
                                th:text="${student.name}"></td>
                            <td class="px-5 py-3 text-slate-500"
                                th:text="${student.section}"></td>
                            <td class="px-5 py-3">
                                <span th:with="absences=${absenceCounts[student.id] != null ? absenceCounts[student.id] : 0}"
                                      th:text="${absences}"
                                      th:classappend="${absences >= 5} ? 'text-red-600 font-semibold' : 'text-slate-500'">
                                </span>
                            </td>
                            <td class="px-5 py-3">
                                <th:block th:with="existing=${attendance.?[student.id == __${student.id}__]}">
                                    <select th:name="'student_' + ${student.id}"
                                            class="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                        <option value="PRESENT"
                                                th:selected="${!#lists.isEmpty(existing) and existing[0].status.name() == 'PRESENT'}">
                                            Present
                                        </option>
                                        <option value="ABSENT"
                                                th:selected="${!#lists.isEmpty(existing) and existing[0].status.name() == 'ABSENT'}">
                                            Absent
                                        </option>
                                    </select>
                                </th:block>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(classGroup.students)}">
                            <td colspan="4" class="px-5 py-10 text-center text-slate-400">
                                No students in this class.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
                Save Attendance
            </button>
        </form>
    </div>

</div>
</body>
</html>
