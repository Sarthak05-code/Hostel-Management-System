<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Class Groups</title></head>
<body>
<h1 layout:fragment="pageTitle">Class Groups</h1>
<div layout:fragment="content">

    <div class="flex justify-end mb-6">
        <form th:action="@{/classes/generate}" method="post">
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg"
                    onclick="return confirm('This will regenerate all class groups. Continue?')">
                ⟳ Generate Classes
            </button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:each="group : ${classGroups}"
             class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between mb-3">
                <h3 class="font-display text-lg text-slate-800" th:text="${group.groupName}"></h3>
                <span th:if="${group.subjectGroup.name() == 'COMPUTER_PHYSICS'}"
                      class="bg-indigo-100 text-indigo-700 text-xs font-medium px-2 py-0.5 rounded-full">Computer & Physics</span>
                <span th:if="${group.subjectGroup.name() == 'ACCOUNTS_ECONOMICS'}"
                      class="bg-amber-100 text-amber-700 text-xs font-medium px-2 py-0.5 rounded-full">Accounts & Economics</span>
            </div>
            <p class="text-sm text-slate-500 mb-3"
               th:text="${#lists.size(group.students)} + ' students'"></p>
            <a th:href="@{/classes/{id}(id=${group.id})}"
               class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">View roster →</a>
        </div>
        <div th:if="${#lists.isEmpty(classGroups)}"
             class="col-span-3 text-center py-16 text-slate-400 text-sm">
            No class groups yet. Click "Generate Classes" to create them.
        </div>
    </div>

</div>
</body>
</html>
