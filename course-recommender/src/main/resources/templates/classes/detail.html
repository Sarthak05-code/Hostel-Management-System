<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/base}"
>
  <head>
    <title>Class Detail</title>
  </head>
  <body>
    <h1 layout:fragment="pageTitle">Class Detail</h1>
    <div layout:fragment="content">
      <div class="max-w-2xl space-y-4">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h2
                class="font-display text-2xl text-slate-800"
                th:text="${classGroup.groupName}"
              ></h2>
              <p
                class="text-sm text-slate-400 mt-0.5"
                th:text="${#lists.size(classGroup.students)} + ' students enrolled'"
              ></p>
            </div>
            <span
              th:if="${classGroup.subjectGroup.name() == 'COMPUTER_PHYSICS'}"
              class="bg-indigo-100 text-indigo-700 text-xs font-medium px-3 py-1 rounded-full"
            >
              Computer & Physics
            </span>
            <span
              th:if="${classGroup.subjectGroup.name() == 'ACCOUNTS_ECONOMICS'}"
              class="bg-amber-100 text-amber-700 text-xs font-medium px-3 py-1 rounded-full"
            >
              Accounts & Economics
            </span>
          </div>

          <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-blue-50 rounded-lg p-3 text-center">
              <p
                class="text-xl font-display text-blue-700"
                th:text="${maleCount}"
              >
                0
              </p>
              <p class="text-xs text-blue-500 mt-0.5">Male students</p>
            </div>
            <div class="bg-pink-50 rounded-lg p-3 text-center">
              <p
                class="text-xl font-display text-pink-700"
                th:text="${femaleCount}"
              >
                0
              </p>
              <p class="text-xs text-pink-500 mt-0.5">Female students</p>
            </div>
          </div>

          <h3 class="text-sm font-medium text-slate-600 mb-2">
            Student Roster
          </h3>
          <div class="border border-slate-100 rounded-lg overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                  <th class="text-left px-4 py-2.5 text-slate-500 font-medium">
                    Name
                  </th>
                  <th class="text-left px-4 py-2.5 text-slate-500 font-medium">
                    Section
                  </th>
                  <th class="text-left px-4 py-2.5 text-slate-500 font-medium">
                    Gender
                  </th>
                  <th class="px-4 py-2.5"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                <tr
                  th:each="student : ${classGroup.students}"
                  class="hover:bg-slate-50"
                >
                  <td
                    class="px-4 py-2.5 font-medium text-slate-800"
                    th:text="${student.name}"
                  ></td>
                  <td
                    class="px-4 py-2.5 text-slate-500"
                    th:text="${student.section}"
                  ></td>
                  <td class="px-4 py-2.5">
                    <span
                      th:if="${student.gender.name() == 'MALE'}"
                      class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full"
                      >Male</span
                    >
                    <span
                      th:if="${student.gender.name() == 'FEMALE'}"
                      class="bg-pink-100 text-pink-700 text-xs px-2 py-0.5 rounded-full"
                      >Female</span
                    >
                  </td>
                  <td class="px-4 py-2.5">
                    <a
                      th:href="@{/students/{id}(id=${student.id})}"
                      class="text-indigo-500 hover:text-indigo-700 text-xs"
                      >View</a
                    >
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(classGroup.students)}">
                  <td colspan="4" class="px-4 py-8 text-center text-slate-400">
                    No students in this class.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="flex gap-3">
          <a
            th:href="@{/timetable/class/{id}(id=${classGroup.id})}"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            View Timetable
          </a>
          <a
            th:href="@{/attendance/class/{id}(id=${classGroup.id})}"
            class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            Mark Attendance
          </a>
          <form
            th:action="@{/classes/{id}/delete(id=${classGroup.id})}"
            method="post"
            onsubmit="return confirm('Delete this class group?');"
          >
            <button
              class="bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium px-4 py-2 rounded-lg"
            >
              Delete Group
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
