<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/base}"
>
  <head>
    <title>Student Detail</title>
  </head>

  <body>
    <h1 layout:fragment="pageTitle">Student Detail</h1>

    <div layout:fragment="content">
      <div class="max-w-xl space-y-4">
        <!-- Student Card -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h2
                class="font-display text-2xl text-slate-800"
                th:text="${student.name}"
              ></h2>

              <p class="text-slate-400 text-sm mt-0.5">
                ID: <span th:text="${student.id}"></span>
              </p>
            </div>

            <span
              th:if="${student.gender.name() == 'MALE'}"
              class="bg-blue-100 text-blue-700 text-xs font-medium px-3 py-1 rounded-full"
            >
              Male
            </span>

            <span
              th:if="${student.gender.name() == 'FEMALE'}"
              class="bg-pink-100 text-pink-700 text-xs font-medium px-3 py-1 rounded-full"
            >
              Female
            </span>
          </div>

          <!-- Info Grid -->
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-slate-400 text-xs mb-1">Section</p>

              <p
                class="font-medium text-slate-800"
                th:text="${student.section}"
              ></p>
            </div>

            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-slate-400 text-xs mb-1">Stream</p>

              <p
                class="font-medium text-indigo-600"
                th:text="${student.subjectGroup.name() == 'COMPUTER_PHYSICS' ? 'Computer & Physics' : 'Accounts & Economics'}"
              ></p>
            </div>

            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-slate-400 text-xs mb-1">Dorm</p>

              <p
                class="font-medium text-slate-800"
                th:text="${student.dorm != null ? student.dorm.name : 'Not assigned'}"
              ></p>
            </div>

            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-slate-400 text-xs mb-1">Class Group</p>

              <p
                class="font-medium text-slate-800"
                th:text="${student.classGroup != null ? student.classGroup.groupName : 'Not assigned'}"
              ></p>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap items-center gap-3 mt-4">
          <!-- Assign Dorm -->
          <a
            th:href="@{/students/{id}/assign-dorm(id=${student.id})}"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            Assign Dorm
          </a>

          <!-- Remove Dorm -->
          <form
            th:if="${student.dorm != null}"
            th:action="@{/students/{id}/remove-dorm(id=${student.id})}"
            method="post"
          >
            <button
              class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
            >
              Remove from Dorm
            </button>
          </form>

          <!-- Delete -->
          <form
            th:action="@{/students/{id}/delete(id=${student.id})}"
            method="post"
            onsubmit="return confirm('Remove this student?');"
          >
            <button
              class="bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
            >
              Delete
            </button>
          </form>

          <!-- Edit -->
          <a
            th:href="@{/students/{id}/edit(id=${student.id})}"
            class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            Edit
          </a>

          <!-- Attendance -->
          <a
            th:href="@{/attendance/student/{id}(id=${student.id})}"
            class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            View Attendance
          </a>

          <!-- ID Card -->
          <a
            th:href="@{/students/{id}/id-card(id=${student.id})}"
            class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            🪪 ID Card
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
