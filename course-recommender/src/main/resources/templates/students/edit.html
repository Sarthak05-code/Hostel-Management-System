<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Edit Student</title></head>
<body>
<h1 layout:fragment="pageTitle">Edit Student</h1>
<div layout:fragment="content">

    <div class="max-w-lg">
        <div class="mb-4">
            <a th:href="@{/students/{id}(id=${student.id})}"
               class="text-sm text-indigo-600 hover:text-indigo-800">← Back to Student</a>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <form th:action="@{/students/{id}/edit(id=${student.id})}"
                  th:object="${student}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" th:field="*{name}" required
                           class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Gender</label>
                    <select th:field="*{gender}"
                            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Section</label>
                    <select th:field="*{section}"
                            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option th:each="s : ${sections}" th:value="${s}" th:text="${s}"></option>
                    </select>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
                        Save Changes
                    </button>
                    <a th:href="@{/students/{id}(id=${student.id})}"
                       class="text-sm text-slate-500 hover:text-slate-700 px-5 py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
