<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$CONTENT_TITLE — HMS">HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Fraunces", "serif"],
            },
            colors: {
              navy: {
                900: "#0f172a",
                800: "#1e293b",
                700: "#334155",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-50 font-sans flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-navy-900 text-white flex flex-col fixed h-full z-10">
      <div class="px-6 py-6 border-b border-navy-700">
        <p class="font-display text-xl text-white leading-tight">Hostel</p>
        <p class="font-display text-xl text-indigo-400 leading-tight">
          Management
        </p>
      </div>
      <nav class="flex-1 px-4 py-6 space-y-1">
        <a
          th:href="@{/}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>⊞</span> Dashboard
        </a>
        <a
          th:href="@{/students}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>👤</span> Students
        </a>
        <a
          th:href="@{/dorms}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>🏠</span> Dorms
        </a>
        <a
          th:href="@{/supervisors}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>🧑‍💼</span> Supervisors
        </a>
        <a
          th:href="@{/classes}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>📚</span> Class Groups
        </a>
        <a
          th:href="@{/timetable}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>🗓</span> Timetable
        </a>
        <a
          th:href="@{/generate-students}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>⚡</span> Generate Students
        </a>
        <a
          th:href="@{/notices}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-navy-700 hover:text-white transition-colors text-sm"
        >
          <span>📌</span> Notice Board
        </a>
      </nav>
      <div class="px-6 py-4 border-t border-navy-700">
        <p class="text-xs text-slate-500">HMS v1.0</p>
      </div>
    </aside>

    <!-- Main -->
    <main class="ml-64 flex-1 flex flex-col">
      <header
        class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10"
      >
        <h1
          class="font-display text-xl text-slate-800"
          layout:fragment="pageTitle"
        >
          Page Title
        </h1>
        <span class="text-xs text-slate-400 bg-slate-100 px-3 py-1 rounded-full"
          >Admin</span
        >
      </header>
      <div class="px-8 pt-4" th:if="${success}">
        <div
          class="bg-green-50 border border-green-200 text-green-800 text-sm px-4 py-3 rounded-lg"
        >
          ✓ <span th:text="${success}"></span>
        </div>
      </div>
      <div class="px-8 py-6 flex-1">
        <div layout:fragment="content">
          <!-- page content goes here -->
        </div>
      </div>
    </main>
  </body>
</html>
