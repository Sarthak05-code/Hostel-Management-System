<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Dorm Detail</title></head>
<body>
<h1 layout:fragment="pageTitle">Dorm Detail</h1>
<div layout:fragment="content">

    <div class="max-w-2xl space-y-4">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="flex items-start justify-between mb-4">
                <div>
                    <h2 class="font-display text-2xl text-slate-800" th:text="${dorm.name}"></h2>
                    <p class="text-sm text-slate-400 mt-0.5">
                        Supervisor:
                        <span th:text="${dorm.supervisor != null ? dorm.supervisor.name : 'None'}"></span>
                    </p>
                </div>
                <span th:if="${dorm.gender.name() == 'MALE'}"
                      class="bg-blue-100 text-blue-700 text-xs font-medium px-3 py-1 rounded-full">Male</span>
                <span th:if="${dorm.gender.name() == 'FEMALE'}"
                      class="bg-pink-100 text-pink-700 text-xs font-medium px-3 py-1 rounded-full">Female</span>
            </div>
            <div class="mb-5">
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-slate-500">Occupancy</span>
                    <span class="font-medium text-slate-800"
                          th:text="${occupancy} + ' / ' + ${capacity}"></span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2">
                    <div class="bg-indigo-500 h-2 rounded-full"
                         th:style="'width: ' + ${(occupancy / capacity) * 100} + '%'"></div>
                </div>
            </div>
            <h3 class="text-sm font-medium text-slate-600 mb-2">Students in this dorm</h3>
            <div class="divide-y divide-slate-100 border border-slate-100 rounded-lg overflow-hidden">
                <div th:each="student : ${dorm.students}"
                     class="flex items-center justify-between px-4 py-2.5 text-sm hover:bg-slate-50">
                    <span th:text="${student.name}" class="text-slate-800"></span>
                    <div class="flex items-center gap-2">
                        <span th:text="${student.section}" class="text-slate-400"></span>
                        <a th:href="@{/students/{id}(id=${student.id})}"
                           class="text-indigo-500 hover:text-indigo-700 text-xs">View</a>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(dorm.students)}"
                     class="px-4 py-6 text-center text-slate-400 text-sm">No students assigned.</div>
            </div>
        </div>
        <div class="flex gap-3">
            <form th:action="@{/dorms/{id}/delete(id=${dorm.id})}" method="post"
                  onsubmit="return confirm('Delete this dorm?')">
                <button class="bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium px-4 py-2 rounded-lg">
                    Delete Dorm
                </button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
