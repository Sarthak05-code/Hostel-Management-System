<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Dorms</title></head>
<body>
<h1 layout:fragment="pageTitle">Dorms</h1>
<div layout:fragment="content">

    <div class="flex justify-end mb-6">
        <a th:href="@{/dorms/add}"
           class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
            + Add Dorm
        </a>
    </div>

    <div th:if="${!#lists.isEmpty(overCapacity)}"
         class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg">
        ⚠ <span th:text="${#lists.size(overCapacity)}"></span> dorm(s) are over capacity.
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:each="dorm : ${dorms}"
             class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between mb-3">
                <h3 class="font-display text-lg text-slate-800" th:text="${dorm.name}"></h3>
                <span th:if="${dorm.gender.name() == 'MALE'}"
                      class="bg-blue-100 text-blue-700 text-xs font-medium px-2 py-0.5 rounded-full">Male</span>
                <span th:if="${dorm.gender.name() == 'FEMALE'}"
                      class="bg-pink-100 text-pink-700 text-xs font-medium px-2 py-0.5 rounded-full">Female</span>
            </div>
            <div class="mb-3">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                    <span>Occupancy</span>
                    <span th:text="${#lists.size(dorm.students)} + ' / 25'"></span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5">
                    <div class="bg-indigo-500 h-1.5 rounded-full"
                         th:style="'width: ' + ${(#lists.size(dorm.students) / 25.0) * 100} + '%'"></div>
                </div>
            </div>
            <div class="text-xs text-slate-400 mb-4">
                Supervisor:
                <span th:text="${dorm.supervisor != null ? dorm.supervisor.name : 'None assigned'}"
                      th:class="${dorm.supervisor == null ? 'text-red-400' : 'text-slate-600'}"></span>
            </div>
            <a th:href="@{/dorms/{id}(id=${dorm.id})}"
               class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">View details →</a>
        </div>
        <div th:if="${#lists.isEmpty(dorms)}"
             class="col-span-3 text-center py-16 text-slate-400 text-sm">
            No dorms created yet.
        </div>
    </div>

</div>
</body>
</html>
